---

- name: Get nodes from Inventory and add to Groups
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
  - include_role: 
      name: utils_hosts_aws

- name: Setup Paloalto provisioning
  hosts: localhost
  connection: local
  gather_facts: no
  vars_files: vars/main.yml
  tasks:

    - name: Set provider
      set_fact: 
        panos_provider: 
          ip_address: "{{ groups['paloalto'][0] }}"
          username: "{{ ansible_user }}"
          password: "{{ ansible_ssh_pass }}"

    - name: Hostvars
      debug:
        var: hostvars['localhost']

    - name: System Authentication
      set_fact:
        payload: "{{ ansible_eda.event.payload }}"

    # - name: Debug Payload
    #   debug:
    #     var: ansible_eda.event.payload

    - name: Add Policy Rule to Quarantine Host
      paloaltonetworks.panos.panos_security_rule:
        provider: "{{ panos_provider }}"
        rule_name: "Quarantine {{ payload.src }}"
        description: "Quarantine {{ payload.src }}"
        source_zone: "{{ payload.from }}"
        destination_zone: "{{ payload.to }}"
        source_ip: "{{ payload.src }}"
        destination_ip: ['any']
        category: ['any']
        application: ['any']
        service: ['any']
        action: deny
        commit: yes