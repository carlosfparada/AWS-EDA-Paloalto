---

- name: "Receive logs sourced from HTTP Server Profile in PAN-OS (threat events)"
  hosts: "localhost"
  # Source PanOS threat
  sources:
    - paloaltonetworks.panos.logs:
        host: 0.0.0.0
        port: 5002
        #type: threat
  # Rule threat logs
  rules:
    - name: "Handle Threats - Virus Detection"
      condition: event.payload.type == "THREAT" and event.payload.subtype == "virus"
      actions:
        # Debug
        - debug: 
            var: event.payload
        - print_event:
            pretty: true
        # Notify Slack
        - run_job_template:
            organization: "Default"
            name: "AWS EDA Paloalto: X. Threat Virus"
