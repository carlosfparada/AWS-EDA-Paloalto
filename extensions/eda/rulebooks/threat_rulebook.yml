---

- name: "Receive logs sourced from HTTP Server Profile in PAN-OS (threat events)"
  hosts: "localhost"
  # Source PanOS threat
  sources:
    - paloaltonetworks.panos.logs:
        host: 0.0.0.0
        port: 5002
        #type: threat
  # Rule threat logs
  rules:
    - name: "Handle Threats - Virus Detection"
      condition: event.payload.type == "THREAT" and event.payload.subtype == "virus"
      actions:
        - print_event:
            pretty: true
        # Isolate host (quarantine)
        - run_job_template:
            organization: "Default"
            name: "AWS EDA Paloalto: X. Threat Virus"
    - name: "Handle Threats - Vulnerability Detection"
      condition: event.payload.type == "THREAT" and event.payload.subtype == "vulnerability"
      actions:
        - print_event:
            pretty: true
        # Isolate web server (quarantine)
        - run_job_template:
            organization: "Default"
            name: "AWS EDA Paloalto: X. Threat Vulnerability"
