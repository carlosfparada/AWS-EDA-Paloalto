---

# - name: Refresh inventory
#   ansible.builtin.meta: refresh_inventory

- name: Get paloalto node
  set_fact:
    node_name: "{{ item }}"
  loop: "{{ groups['all'] }}"
  when: hostvars[item].tags is defined and hostvars[item].tags.Name is match("^paloalto-(.*)$")

- name: Add paloalto node to the paloalto group
  add_host:
    name: "{{ node_name }}"
    groups: "{{ group_name }}"
  when: node_name is defined

- name: Get RHEL node
  set_fact:
    node_name: "{{ item }}"
  loop: "{{ groups['all'] }}"
  when: hostvars[item].tags is defined and hostvars[item].tags.Name is match("^rhel-1$")

- name: Add RHEL node to the rhel group
  add_host:
    name: "{{ node_name }}"
    groups: "rhel"
  when: node_name is defined

- name: Get RHEL Jump node
  set_fact:
    node_name: "{{ item }}"
  loop: "{{ groups['all'] }}"
  when: hostvars[item].tags is defined and hostvars[item].tags.Name is match("^rhel-jump$")

- name: Add RHEL JUMP node to the rhel_jump group
  add_host:
    name: "{{ node_name }}"
    groups: "rhel_jump"
  when: node_name is defined